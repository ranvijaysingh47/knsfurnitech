<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - KNS Furnitech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-page">

    <div class="auth-split-container">
        <!-- Image Side -->
        <div class="auth-image-side" style="background-image: url('https://images.unsplash.com/photo-1540518614846-7eded433c457?w=1200&q=80')">
            <div class="auth-image-content">
                <h2>Secure Your<br>Account</h2>
                <p>Ensuring your privacy with advanced protection.</p>
            </div>
        </div>

        <!-- Form Side -->
        <div class="auth-form-side">
            <a href="signin.html" class="auth-back-home">
                <i data-lucide="arrow-left" size="16"></i> Back to Sign In
            </a>

            <div class="auth-box">
                <div class="auth-header">
                    <div class="auth-logo logo">
                    <a href="index.html" class="logo">
                    <img src="images/logo.png" alt="KNS Furnitech" class="logo-img">
                    <span>KNS FURNITECH</span>
                </a>
                    </div>
                    <h1>Forgot Password?</h1>
                    <p>Enter your email and we'll send you a reset link</p>
                </div>

                <div id="forgotSuccess" class="auth-error-msg" style="background: #f0fdf4; color: #166534; border-color: #bbf7d0;"></div>
                <div id="forgotError" class="auth-error-msg"></div>

                <form id="kns-forgot-password-form" onsubmit="handleForgotPassword(event)">
                    <div class="auth-group">
                        <label class="auth-label">Email Address</label>
                        <div class="auth-input-wrap">
                            <i data-lucide="mail" size="18"></i>
                            <input type="email" id="forgotEmail" class="auth-input" placeholder="name@company.com" required>
                        </div>
                    </div>

                    <button type="submit" class="auth-btn">Send Reset Link</button>
                    
                    <div class="auth-footer">
                        Remember your password? <a href="signin.html">Sign In</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (Modular v9+) -->
    <!-- Firebase SDK (Compat v9/v11) -->
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>
    
    <script src="firebase-config.js?v=4"></script>
    <script src="auth.js?v=4"></script>
    <script>
        lucide.createIcons();

        async function handleForgotPassword(e) {
            e.preventDefault();
            const email = document.getElementById('forgotEmail').value.trim();
            const successEl = document.getElementById('forgotSuccess');
            const errorEl = document.getElementById('forgotError');
            
            successEl.style.display = 'none';
            errorEl.style.display = 'none';

            try {
                const res = await KNSAuth.forgotPassword(email);
                if (res.ok) {
                    successEl.textContent = res.msg;
                    successEl.style.display = 'block';
                    document.getElementById('kns-forgot-password-form').reset();
                } else {
                    errorEl.textContent = res.msg;
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = "An error occurred. Please try again.";
                errorEl.style.display = 'block';
            }
        }
    </script>
</body>
</html>
