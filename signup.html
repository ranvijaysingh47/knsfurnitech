<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - KNS Furnitech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="auth-page">

    <div class="auth-split-container">
        <!-- Image Side -->
        <div class="auth-image-side" style="background-image: url('https://images.unsplash.com/photo-1594026112284-02bb6f3352fe?w=1200&q=80')">
            <div class="auth-image-content">
                <h2>Join Our<br>Design Community</h2>
                <p>Curating the finest furniture for modern living.</p>
            </div>
        </div>

        <!-- Form Side -->
        <div class="auth-form-side">
            <a href="index.html" class="auth-back-home">
                <i data-lucide="arrow-left" size="16"></i> Back to Home
            </a>

            <div class="auth-box">
                <div class="auth-header">
                    <div class="logo">
                        <img src="images/logo.png" alt="KNS Furnitech" class="logo-img">
                        <span>KNS FURNITECH</span>
                    </div>
                    <h1>Create Account</h1>
                    <p>Start your premium furniture journey today</p>
                </div>

                <div id="signupError" class="auth-error-msg"></div>

                <form id="kns-signup-page-form" onsubmit="handlePageSignup(event)">
                    <div class="auth-group">
                        <label class="auth-label">Full Name</label>
                        <div class="auth-input-wrap">
                            <i data-lucide="user" size="18"></i>
                            <input type="text" id="regName" class="auth-input" placeholder="John Doe" required>
                        </div>
                    </div>

                    <div class="auth-group">
                        <label class="auth-label">Email Address</label>
                        <div class="auth-input-wrap">
                            <i data-lucide="mail" size="18"></i>
                            <input type="email" id="regEmail" class="auth-input" placeholder="name@company.com" required>
                        </div>
                    </div>


                    <div class="auth-group">
                        <label class="auth-label">Password</label>
                        <div class="auth-input-wrap">
                            <i data-lucide="lock" size="18"></i>
                            <input type="password" id="regPassword" class="auth-input" placeholder="Min. 6 characters" required minlength="6">
                        </div>
                    </div>

                    <div class="auth-group">
                        <label class="auth-label">Confirm Password</label>
                        <div class="auth-input-wrap">
                            <i data-lucide="shield-check" size="18"></i>
                            <input type="password" id="regConfirm" class="auth-input" placeholder="Repeat password" required minlength="6">
                        </div>
                    </div>

                    <button type="submit" class="auth-btn">Create Account</button>

                    <div class="auth-divider">or</div>

                    <button type="button" class="auth-btn-google" onclick="handleGoogleLogin()">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="18">
                        Sign up with Google
                    </button>
                    
                    <div class="auth-footer">
                        Already have an account? <a href="signin.html">Sign In</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="kns-loader-overlay">
        <div class="kns-loader-box fade-in-up">
            <div class="kns-orbital-loader">
                <div class="kns-orbital-dot"></div>
                <div class="kns-orbital-dot"></div>
                <div class="kns-orbital-dot"></div>
            </div>
            <p class="kns-loader-text">Creating your account</p>
        </div>
    </div>

    <!-- Firebase SDK (Compat v9/v11) -->
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>
    
    <script src="firebase-config.js?v=4"></script>
    <script src="auth.js?v=4"></script>
    <script src="cart.js?v=4"></script>
    <script>
        lucide.createIcons();

        async function handlePageSignup(e) {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;

            if (password !== confirm) {
                const errorEl = document.getElementById('signupError');
                errorEl.textContent = 'Passwords do not match.';
                errorEl.style.display = 'block';
                return;
            }

            try {
                const res = await KNSAuth.register(name, email, password);
                if (res.ok) {
                    // Show Loading Overlay
                    document.getElementById('loadingOverlay').classList.add('active');
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    const errorEl = document.getElementById('signupError');
                    errorEl.textContent = res.msg || 'Registration failed';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                const errorEl = document.getElementById('signupError');
                errorEl.textContent = 'An unexpected error occurred. Please try again.';
                errorEl.style.display = 'block';
            }
        }
        async function handleGoogleLogin() {
            try {
                const res = await KNSAuth.loginWithGoogle();
                if (res.ok) {
                    document.getElementById('loadingOverlay').classList.add('active');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    const errorEl = document.getElementById('signupError');
                    errorEl.textContent = res.msg || 'Google registration failed';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                console.error("Google Signup Error:", err);
            }
        }

        window.handlePageSignup = handlePageSignup;
        window.handleGoogleLogin = handleGoogleLogin;
    </script>
</body>
</html>
